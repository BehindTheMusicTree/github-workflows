# App-agnostic reusable workflow: transfer an env fragment (from caller artifact) to the server and merge into scripts/.env.
# Caller builds the fragment in its repo (app-specific keys), uploads it as an artifact, then calls this workflow.
# Path from caller vars: VPS_IP, REDEPLOYMENT_ROOT (org pool, e.g. /var/webhook/redeployment).
name: Sync env to server

on:
  workflow_call:
    inputs:
      sync_env:
        description: "Environment name for path (prod or staging)"
        required: true
        type: string
      fragment_artifact:
        description: "Artifact name and path to fragment file, e.g. sync-env-fragment/fragment.env"
        required: true
        type: string
      app_name:
        description: "App name for fragment path (e.g. htmt-api)"
        required: true
        type: string

jobs:
  sync:
    name: Transfer fragment to server (${{ inputs.sync_env }})
    runs-on: ubuntu-latest
    env:
      SSH_DESTINATION: ${{ secrets.SERVER_DEPLOY_USERNAME }}@${{ vars.VPS_IP }}
      REDEPLOYMENT_ROOT: ${{ vars.REDEPLOYMENT_ROOT }}
      SYNC_ENV_REMOTE_FILENAME_PREFIX_BASE: ${{ vars.SYNC_ENV_REMOTE_FILENAME_PREFIX_BASE }}
      APP_NAME: ${{ inputs.app_name }}
    steps:
      - name: Check required vars and secrets
        env:
          VPS_IP: ${{ vars.VPS_IP }}
          REDEPLOYMENT_ROOT: ${{ vars.REDEPLOYMENT_ROOT }}
          SERVER_DEPLOY_USERNAME: ${{ secrets.SERVER_DEPLOY_USERNAME }}
          SERVER_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.SERVER_DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          required=(VPS_IP REDEPLOYMENT_ROOT SERVER_DEPLOY_USERNAME SERVER_DEPLOY_SSH_PRIVATE_KEY)
          missing=()
          for v in "${required[@]}"; do
            [ -z "${!v}" ] && missing+=("$v")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ERROR: Missing required vars or secrets: ${missing[*]}"
            echo "Set them in Settings → Secrets and variables → Actions (repo or environment)."
            exit 1
          fi
          echo "All required vars and secrets are set."

      - name: Parse fragment artifact input
        id: fragment
        run: |
          val="${{ inputs.fragment_artifact }}"
          echo "artifact_name=${val%%/*}" >> "$GITHUB_OUTPUT"
          if [[ "$val" == */* ]]; then
            echo "fragment_path=${val#*/}" >> "$GITHUB_OUTPUT"
          else
            echo "fragment_path=$val" >> "$GITHUB_OUTPUT"
          fi

      - name: Download env fragment artifact
        uses: actions/download-artifact@v7.0.0
        with:
          name: ${{ steps.fragment.outputs.artifact_name }}

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SERVER_DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.VPS_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload fragment and merge into server .env (${{ inputs.sync_env }})
        env:
          SYNC_ENV: ${{ inputs.sync_env }}
        run: |
          ARTIFACT_NAME="${{ steps.fragment.outputs.artifact_name }}"
          FRAGMENT_PATH="${{ steps.fragment.outputs.fragment_path }}"
          if [ -f "${ARTIFACT_NAME}/${FRAGMENT_PATH}" ]; then
            FRAGMENT_FILE="${ARTIFACT_NAME}/${FRAGMENT_PATH}"
          else
            FRAGMENT_FILE="${FRAGMENT_PATH}"
          fi
          if [ ! -f "$FRAGMENT_FILE" ]; then
            echo "ERROR: Fragment file not found: $FRAGMENT_FILE"
            exit 1
          fi
          FRAGMENT_BASE="${SYNC_ENV_REMOTE_FILENAME_PREFIX_BASE:-sync-env-}${APP_NAME}"
          scp -o StrictHostKeyChecking=accept-new "$FRAGMENT_FILE" "$SSH_DESTINATION:/tmp/${FRAGMENT_BASE}-$SYNC_ENV.env"
          REDEPLOYMENT_ROOT="${REDEPLOYMENT_ROOT:-/var/webhook/redeployment}"
          ssh "$SSH_DESTINATION" "bash -s" -- "$REDEPLOYMENT_ROOT" "$SYNC_ENV" "$FRAGMENT_BASE" << 'REMOTE'
          REDEPLOYMENT_ROOT="$1"
          env="$2"
          prefix="$3"
          FRAGMENT="/tmp/${prefix}-${env}.env"
          scripts_dir="${REDEPLOYMENT_ROOT}-${env}/scripts"
          env_file="${scripts_dir}/.env"
          if [ ! -f "$env_file" ]; then
            echo "ERROR: $env_file not found"
            exit 1
          fi
          tmp=$(mktemp)
          while IFS= read -r line; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            key="${line%%=*}"
            grep -v "^${key}=" "$env_file" > "$tmp" 2>/dev/null || true
            echo "$line" >> "$tmp"
            mv "$tmp" "$env_file"
            tmp=$(mktemp)
          done < "$FRAGMENT"
          rm -f "$tmp"
          echo "Updated $env_file; app env file left at $FRAGMENT for redeploy"
          REMOTE
