# App-agnostic reusable workflow: upload an env fragment into ENV_POOL_DIR on the server (atomic write).
# Redeploy promotes pool → scripts/sync-env/ via promote-sync-env-to-canonical.sh (BTMT/TMD).
# Caller vars: SERVER_HOST, ENV_POOL_DIR (+ optional SYNC_ENV_REMOTE_FILENAME_PREFIX_BASE).
name: Sync env to server

on:
  workflow_call:
    inputs:
      sync_env:
        description: "Environment name for path (prod or staging)"
        required: true
        type: string
      fragment_artifact:
        description: "Artifact name and path to fragment file, e.g. sync-env-fragment/fragment.env"
        required: true
        type: string
      app_name:
        description: "App name for fragment path (e.g. htmt-api)"
        required: true
        type: string

jobs:
  sync:
    name: Transfer fragment to server (${{ inputs.sync_env }})
    runs-on: ubuntu-latest
    env:
      SSH_DESTINATION: ${{ secrets.SERVER_DEPLOY_USERNAME }}@${{ vars.SERVER_HOST }}
      ENV_POOL_DIR: ${{ vars.ENV_POOL_DIR }}
      SYNC_ENV_REMOTE_FILENAME_PREFIX_BASE: ${{ vars.SYNC_ENV_REMOTE_FILENAME_PREFIX_BASE }}
      APP_NAME: ${{ inputs.app_name }}
    steps:
      - name: Check required vars and secrets
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          ENV_POOL_DIR: ${{ vars.ENV_POOL_DIR }}
          SERVER_DEPLOY_USERNAME: ${{ secrets.SERVER_DEPLOY_USERNAME }}
          SERVER_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.SERVER_DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          required=(SERVER_HOST ENV_POOL_DIR SERVER_DEPLOY_USERNAME SERVER_DEPLOY_SSH_PRIVATE_KEY)
          missing=()
          for v in "${required[@]}"; do
            [ -z "${!v}" ] && missing+=("$v")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ERROR: Missing required vars or secrets: ${missing[*]}"
            echo "Set them in Settings → Secrets and variables → Actions (repo or environment)."
            exit 1
          fi
          echo "All required vars and secrets are set."

      - name: Parse fragment artifact input
        id: fragment
        run: |
          val="${{ inputs.fragment_artifact }}"
          echo "artifact_name=${val%%/*}" >> "$GITHUB_OUTPUT"
          if [[ "$val" == */* ]]; then
            echo "fragment_path=${val#*/}" >> "$GITHUB_OUTPUT"
          else
            echo "fragment_path=$val" >> "$GITHUB_OUTPUT"
          fi

      - name: Download env fragment artifact
        uses: actions/download-artifact@v7.0.0
        with:
          name: ${{ steps.fragment.outputs.artifact_name }}

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SERVER_DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload fragment to env pool (${{ inputs.sync_env }})
        env:
          SYNC_ENV: ${{ inputs.sync_env }}
        run: |
          ARTIFACT_NAME="${{ steps.fragment.outputs.artifact_name }}"
          FRAGMENT_PATH="${{ steps.fragment.outputs.fragment_path }}"
          if [ -f "${ARTIFACT_NAME}/${FRAGMENT_PATH}" ]; then
            FRAGMENT_FILE="${ARTIFACT_NAME}/${FRAGMENT_PATH}"
          else
            FRAGMENT_FILE="${FRAGMENT_PATH}"
          fi
          if [ ! -f "$FRAGMENT_FILE" ]; then
            echo "ERROR: Fragment file not found: $FRAGMENT_FILE"
            exit 1
          fi
          FRAGMENT_BASE="${SYNC_ENV_REMOTE_FILENAME_PREFIX_BASE:-sync-env-}${APP_NAME}"
          REMOTE_FRAGMENT_PATH="${ENV_POOL_DIR%/}/${FRAGMENT_BASE}-${SYNC_ENV}.env"
          REMOTE_FRAGMENT_TMP="${REMOTE_FRAGMENT_PATH}.new"
          scp -o StrictHostKeyChecking=accept-new "$FRAGMENT_FILE" "$SSH_DESTINATION:$REMOTE_FRAGMENT_TMP"
          ssh "$SSH_DESTINATION" "bash -s" -- "$SYNC_ENV" "$FRAGMENT_BASE" "$ENV_POOL_DIR" << 'REMOTE'
          set -euo pipefail
          env="$1"
          prefix="$2"
          env_pool_dir="$3"
          FRAGMENT="${env_pool_dir%/}/${prefix}-${env}.env"
          mkdir -p "${env_pool_dir%/}"
          chmod 0750 "${env_pool_dir%/}" || true
          chmod 0600 "${FRAGMENT}.new" || true
          mv -f "${FRAGMENT}.new" "$FRAGMENT"
          echo "Wrote pooled fragment: $FRAGMENT (redeploy will promote to scripts/sync-env/)"
          REMOTE
