# Reusable workflow: write image tag to server scripts dir for the given env and service.
# Caller must have var REDEPLOYMENT_ROOT (required; no fallback), SERVER_HOST,
# and secrets SERVER_DEPLOY_USERNAME, SERVER_DEPLOY_SSH_PRIVATE_KEY (same as other deploy workflows).
# Filename on server: ${app_name}-tag (e.g. htmt-api-tag, htmt-db-tag, afp-tag).
name: Set image tag on server

on:
  workflow_call:
    inputs:
      env:
        description: "Environment (staging or prod)"
        required: true
        type: string
      tag:
        description: "Image tag to write (e.g. staging, 1.2.4, 16)"
        required: true
        type: string
      app_name:
        description: "Service/app name for filename (e.g. htmt-api, htmt-db, afp)"
        required: true
        type: string

jobs:
  set-tag:
    name: Set image tag on server
    runs-on: ubuntu-latest
    env:
      SSH_DESTINATION: ${{ secrets.SERVER_DEPLOY_USERNAME }}@${{ vars.SERVER_HOST }}
    steps:
      - name: Check required vars and secrets
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          REDEPLOYMENT_ROOT: ${{ vars.REDEPLOYMENT_ROOT }}
          SERVER_DEPLOY_USERNAME: ${{ secrets.SERVER_DEPLOY_USERNAME }}
          SERVER_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.SERVER_DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          required=(SERVER_HOST REDEPLOYMENT_ROOT SERVER_DEPLOY_USERNAME SERVER_DEPLOY_SSH_PRIVATE_KEY)
          missing=()
          for v in "${required[@]}"; do
            [ -z "${!v}" ] && missing+=("$v")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ERROR: Missing required vars or secrets: ${missing[*]}"
            echo "Set them in Settings → Secrets and variables → Actions (repo or environment)."
            exit 1
          fi
          echo "All required vars and secrets are set."

      - name: Validate env
        id: validate
        run: |
          env_lower=$(echo '${{ inputs.env }}' | tr '[:upper:]' '[:lower:]')
          if [[ "$env_lower" != "prod" && "$env_lower" != "staging" ]]; then
            echo "ERROR: env must be 'prod' or 'staging' (got: ${{ inputs.env }})."
            exit 1
          fi
          echo "env_lower=$env_lower" >> $GITHUB_OUTPUT

      - name: Set remote path
        id: path
        env:
          REDEPLOYMENT_ROOT: ${{ vars.REDEPLOYMENT_ROOT }}
        run: |
          ENV_LC="${{ steps.validate.outputs.env_lower }}"
          SCRIPTS_DIR="${REDEPLOYMENT_ROOT}-${ENV_LC}/scripts/"
          echo "remote_path=${SCRIPTS_DIR}${{ inputs.app_name }}-tag" >> $GITHUB_OUTPUT

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SERVER_DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Write tag file on server
        env:
          TAG: ${{ inputs.tag }}
          REMOTE_PATH: ${{ steps.path.outputs.remote_path }}
        run: |
          ssh ${{ env.SSH_DESTINATION }} "printf '%s' \"$TAG\" > \"$REMOTE_PATH\""
          echo "Wrote tag to $REMOTE_PATH"
