# Reusable workflow: write image tag to server scripts dir for the given env and service.
# Caller must have var REDEPLOYMENT_ROOT (org pool, e.g. /var/webhook/redeployment), VPS_IP,
# and secrets SERVER_DEPLOY_USERNAME, SERVER_DEPLOY_SSH_PRIVATE_KEY (same as other deploy workflows).
# Filename on server: ${app_name}-tag (e.g. htmt-api-tag, htmt-db-tag, afp-tag).
name: Set image tag on server

on:
  workflow_call:
    inputs:
      env:
        description: "Environment (test or prod)"
        required: true
        type: string
      tag:
        description: "Image tag to write (e.g. staging, 1.2.4, 16)"
        required: true
        type: string
      app_name:
        description: "Service/app name for filename (e.g. htmt-api, htmt-db, afp)"
        required: true
        type: string

jobs:
  set-tag:
    name: Set image tag on server
    runs-on: ubuntu-latest
    env:
      SSH_DESTINATION: ${{ secrets.SERVER_DEPLOY_USERNAME }}@${{ vars.VPS_IP }}
    steps:
      - name: Validate env
        id: validate
        run: |
          env_lower=$(echo '${{ inputs.env }}' | tr '[:upper:]' '[:lower:]')
          if [[ "$env_lower" != "test" && "$env_lower" != "prod" ]]; then
            echo "ERROR: env must be 'test' or 'prod' (got: ${{ inputs.env }})."
            exit 1
          fi
          echo "env_lower=$env_lower" >> $GITHUB_OUTPUT

      - name: Set remote path
        id: path
        env:
          REDEPLOYMENT_ROOT: ${{ vars.REDEPLOYMENT_ROOT }}
        run: |
          ENV_LC="${{ steps.validate.outputs.env_lower }}"
          REDEPLOYMENT_ROOT="${REDEPLOYMENT_ROOT:-/var/webhook/redeployment}"
          SCRIPTS_DIR="${REDEPLOYMENT_ROOT}-${ENV_LC}/scripts/"
          echo "remote_path=${SCRIPTS_DIR}${{ inputs.app_name }}-tag" >> $GITHUB_OUTPUT

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SERVER_DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Write tag file on server
        env:
          TAG: ${{ inputs.tag }}
          REMOTE_PATH: ${{ steps.path.outputs.remote_path }}
        run: |
          ssh ${{ env.SSH_DESTINATION }} "printf '%s' \"$TAG\" > \"$REMOTE_PATH\""
          echo "Wrote tag to $REMOTE_PATH"
