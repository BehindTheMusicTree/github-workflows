# App-agnostic reusable workflow: push an env fragment to a Coolify application via API.
# Idempotent: GET existing envs → POST new keys, PATCH changed values.
# Caller must supply coolify_api_url (e.g. vars.COOLIFY_API_URL) and coolify_api_token secret.
name: Sync env to Coolify

on:
  workflow_call:
    inputs:
      app_name:
        description: "Coolify application name (e.g. htmt-api)"
        required: true
        type: string
      coolify_environment:
        description: "Coolify environment name (production or staging)"
        required: true
        type: string
      fragment_artifact:
        description: "Artifact name/path to env fragment (e.g. sync-env-fragment-api-staging/fragment.env)"
        required: true
        type: string
      coolify_api_url:
        description: "Coolify API base URL (e.g. https://coolify.example.com)"
        required: true
        type: string
    secrets:
      coolify_api_token:
        required: true

jobs:
  sync:
    name: Push env vars to Coolify (${{ inputs.coolify_environment }})
    runs-on: ubuntu-latest
    steps:
      - name: Parse fragment artifact input
        id: fragment
        run: |
          val="${{ inputs.fragment_artifact }}"
          echo "artifact_name=${val%%/*}" >> "$GITHUB_OUTPUT"
          if [[ "$val" == */* ]]; then
            echo "fragment_path=${val#*/}" >> "$GITHUB_OUTPUT"
          else
            echo "fragment_path=$val" >> "$GITHUB_OUTPUT"
          fi

      - name: Download env fragment artifact
        uses: actions/download-artifact@v7.0.0
        with:
          name: ${{ steps.fragment.outputs.artifact_name }}

      - name: Sync env vars to Coolify
        env:
          APP_NAME: ${{ inputs.app_name }}
          COOLIFY_ENVIRONMENT: ${{ inputs.coolify_environment }}
          COOLIFY_API_URL: ${{ inputs.coolify_api_url }}
          COOLIFY_API_TOKEN: ${{ secrets.coolify_api_token }}
          FRAGMENT_PATH: ${{ steps.fragment.outputs.fragment_path }}
          ARTIFACT_NAME: ${{ steps.fragment.outputs.artifact_name }}
        run: |
          set -euo pipefail

          if [ -f "${ARTIFACT_NAME}/${FRAGMENT_PATH}" ]; then
            FRAGMENT_FILE="${ARTIFACT_NAME}/${FRAGMENT_PATH}"
          else
            FRAGMENT_FILE="${FRAGMENT_PATH}"
          fi
          if [ ! -f "$FRAGMENT_FILE" ]; then
            echo "ERROR: Fragment file not found: $FRAGMENT_FILE"
            exit 1
          fi

          echo "Looking up Coolify app '${APP_NAME}' in environment '${COOLIFY_ENVIRONMENT}'..."
          apps=$(curl -sf -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            "${COOLIFY_API_URL}/api/v1/applications")
          app_uuid=$(echo "$apps" | jq -r \
            --arg name "$APP_NAME" \
            --arg env "$COOLIFY_ENVIRONMENT" \
            '.[] | select(.name == $name and .environment.name == $env) | .uuid' | head -1)
          if [ -z "$app_uuid" ]; then
            echo "ERROR: No Coolify app found with name '${APP_NAME}' in environment '${COOLIFY_ENVIRONMENT}'"
            exit 1
          fi
          echo "Found app UUID: ${app_uuid}"

          existing=$(curl -sf -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            "${COOLIFY_API_URL}/api/v1/applications/${app_uuid}/envs")

          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            key="${line%%=*}"
            value="${line#*=}"
            existing_uuid=$(echo "$existing" | jq -r \
              --arg key "$key" \
              '.[] | select(.key == $key) | .uuid' | head -1)
            json_key=$(printf '%s' "$key" | jq -Rs .)
            json_value=$(printf '%s' "$value" | jq -Rs .)
            if [ -z "$existing_uuid" ]; then
              printf '  POST %s\n' "$key"
              curl -sf -X POST \
                -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"key\":${json_key},\"value\":${json_value},\"is_preview\":false}" \
                "${COOLIFY_API_URL}/api/v1/applications/${app_uuid}/envs" > /dev/null
            else
              json_uuid=$(printf '%s' "$existing_uuid" | jq -Rs .)
              printf '  PATCH %s\n' "$key"
              curl -sf -X PATCH \
                -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"uuid\":${json_uuid},\"key\":${json_key},\"value\":${json_value},\"is_preview\":false}" \
                "${COOLIFY_API_URL}/api/v1/applications/${app_uuid}/envs" > /dev/null
            fi
          done < "$FRAGMENT_FILE"
          echo "Done — env vars synced for '${APP_NAME}' (${COOLIFY_ENVIRONMENT})"
