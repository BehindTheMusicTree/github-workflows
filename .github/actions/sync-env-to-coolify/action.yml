# App-agnostic composite action: push an env fragment to a Coolify application via API.
# Idempotent: GET existing envs → POST new keys, PATCH changed values.
# Runs in the caller's job so the fragment file (containing plaintext secrets)
# never leaves the runner or gets persisted as an artifact.
name: Sync env to Coolify
description: Push a local env fragment file to a Coolify application via API

inputs:
  app_name:
    description: "Coolify application name (e.g. htmt-api)"
    required: true
  coolify_environment:
    description: "Coolify environment name (production or staging)"
    required: true
  fragment_path:
    description: "Local path to the env fragment file (e.g. fragment.env)"
    required: true
  coolify_subdomain:
    description: "Coolify subdomain (e.g. coolify)"
    required: true
  domain:
    description: "Base domain (e.g. example.com)"
    required: true
  coolify_api_token:
    description: "Coolify API token (composite actions have no secrets: block — pass via with:)"
    required: true
  is_buildtime:
    description: "Set is_buildtime on synced env vars"
    required: false
    default: "false"
  is_runtime:
    description: "Set is_runtime on synced env vars"
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Sync env vars to Coolify
      shell: bash
      env:
        APP_NAME: ${{ inputs.app_name }}
        COOLIFY_ENVIRONMENT: ${{ inputs.coolify_environment }}
        COOLIFY_SUBDOMAIN: ${{ inputs.coolify_subdomain }}
        DOMAIN: ${{ inputs.domain }}
        COOLIFY_API_TOKEN: ${{ inputs.coolify_api_token }}
        FRAGMENT_FILE: ${{ inputs.fragment_path }}
        IS_BUILDTIME: ${{ inputs.is_buildtime }}
        IS_RUNTIME: ${{ inputs.is_runtime }}
      run: |
        set -euo pipefail

        COOLIFY_API_URL="https://${COOLIFY_SUBDOMAIN}.${DOMAIN}"

        if [ ! -f "$FRAGMENT_FILE" ]; then
          echo "ERROR: Fragment file not found: $FRAGMENT_FILE"
          exit 1
        fi

        echo "Looking up Coolify app '${APP_NAME}' in environment '${COOLIFY_ENVIRONMENT}'..."

        # /api/v1/applications only exposes environment_id (no nested environment name),
        # so resolve the target environment's id(s) across all projects first.
        projects=$(curl -sf -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
          "${COOLIFY_API_URL}/api/v1/projects")

        env_ids="[]"
        for project_uuid in $(echo "$projects" | jq -r '.[].uuid'); do
          project=$(curl -sf -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            "${COOLIFY_API_URL}/api/v1/projects/${project_uuid}")
          ids=$(echo "$project" | jq -c --arg env "$COOLIFY_ENVIRONMENT" \
            '[.environments[] | select(.name == $env) | .id]')
          env_ids=$(jq -c -n --argjson a "$env_ids" --argjson b "$ids" '$a + $b')
        done

        apps=$(curl -sf -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
          "${COOLIFY_API_URL}/api/v1/applications")
        app_uuid=$(echo "$apps" | jq -r \
          --arg name "$APP_NAME" \
          --argjson env_ids "$env_ids" \
          '.[] | select(.name == $name and (.environment_id | IN($env_ids[]))) | .uuid' | head -1)
        if [ -z "$app_uuid" ]; then
          echo "ERROR: No Coolify app found with name '${APP_NAME}' in environment '${COOLIFY_ENVIRONMENT}'"
          exit 1
        fi
        echo "Found app UUID: ${app_uuid}"

        existing=$(curl -sf -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
          "${COOLIFY_API_URL}/api/v1/applications/${app_uuid}/envs")

        while IFS= read -r line || [ -n "$line" ]; do
          [[ -z "$line" || "$line" == \#* ]] && continue
          key="${line%%=*}"
          value="${line#*=}"
          existing_uuid=$(echo "$existing" | jq -r \
            --arg key "$key" \
            '.[] | select(.key == $key) | .uuid' | head -1)
          json_key=$(printf '%s' "$key" | jq -Rs .)
          json_value=$(printf '%s' "$value" | jq -Rs .)
          curl_request() {
            local method="$1" body="$2" url="$3"
            local http_code response
            response=$(curl -s -w "\n%{http_code}" -X "$method" \
              -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$body" "$url")
            http_code=$(printf '%s' "$response" | tail -1)
            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              printf '    ERROR: HTTP %s — %s\n' "$http_code" "$(printf '%s' "$response" | head -n -1)"
              return 1
            fi
          }
          if [ -z "$existing_uuid" ]; then
            printf '  POST %s\n' "$key"
            curl_request POST \
              "{\"key\":${json_key},\"value\":${json_value},\"is_preview\":false,\"is_buildtime\":${IS_BUILDTIME},\"is_runtime\":${IS_RUNTIME}}" \
              "${COOLIFY_API_URL}/api/v1/applications/${app_uuid}/envs"
          else
            printf '  PATCH %s\n' "$key"
            curl_request PATCH \
              "{\"key\":${json_key},\"value\":${json_value},\"is_preview\":false,\"is_buildtime\":${IS_BUILDTIME},\"is_runtime\":${IS_RUNTIME}}" \
              "${COOLIFY_API_URL}/api/v1/envs/${existing_uuid}"
          fi
        done < "$FRAGMENT_FILE"
        echo "Done — env vars synced for '${APP_NAME}' (${COOLIFY_ENVIRONMENT})"
